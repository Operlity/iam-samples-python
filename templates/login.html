<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IdentityHub Python</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b11;
            --surface: rgba(22, 27, 39, 0.65);
            --primary: #5c54f2;
            --primary-hover: #4f46e5;
            --secondary: #06b6d4;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .glow-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: #080b11;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.12;
            animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 {
            background: var(--primary);
            top: -100px;
            left: -100px;
        }
        .blob-2 {
            background: var(--secondary);
            bottom: -150px;
            right: -150px;
            animation-delay: -6s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 90px) scale(1.15); }
        }

        /* Glassmorphic Login Card */
        .login-card {
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(92, 84, 242, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo-container {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(92, 84, 242, 0.3);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #fff 50%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid transparent;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(92, 84, 242, 0.25);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(92, 84, 242, 0.4);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .login-footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="glow-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="logo-container">
            <svg class="logo-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
        </div>
        <h1>Python Gateway</h1>
        <p>Secure authentication powered by Operlity IdentityHub with OIDC and PKCE.</p>
        
        <a href="/login/start" class="btn-login">
            <span>Login with IdentityHub</span>
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
            </svg>
        </a>

        <div class="login-footer">
            Protected Session &bull; SQLite Storage
        </div>
    </div>
</body>
</html>
